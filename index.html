<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給你一句話</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#f5efe6,#dfeeea);
  color:#2f2a24;
}
.container{
  width:min(90%,720px);
  text-align:center;
  padding:48px 32px;
  animation:fadeIn 1.2s ease forwards;
}
.label{
  opacity:.6;
  letter-spacing:.15em;
  margin-bottom:24px;
}
h1{
  font-size:clamp(32px,6vw,64px);
  line-height:1.35;
  font-weight:500;
  animation:float 4s ease-in-out infinite;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
</style>
</head>
<body>
<main class="container">
  <p class="label">今天想送給你一句話</p>
  <h1 id="quote">載入中...</h1>
</main>

<script>
const quotes = [
  "慢慢來，也是一種前進。",
  "你已經比昨天更靠近自己了。",
  "今天也請溫柔地活著。",
  "願你在混亂裡，仍然找到一座島。",
  "先呼吸，再出發。",
  "有些答案，會在路上慢慢長出來。",
  "你不需要一次成為全部，只要先成為一點點。"
];

const randomIndex = Math.floor(Math.random() * quotes.length);
document.getElementById("quote").textContent = quotes[randomIndex];
</script>
</body>
</html>
